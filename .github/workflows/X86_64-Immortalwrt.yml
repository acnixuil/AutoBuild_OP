name: X86_64 Immortalwrt

on:
  workflow_dispatch:
    inputs:
      subnet:
        description: "默认IP地址:192.168.[].1"
        required: true
        default: "2"
  schedule:
    - cron: '0 22 * * 5' # 每周六 6:00（北京时间）自动编译

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  CONFIG_FILE: x86_imm/x86.config
  CUSTOM_SCRIPT: x86_imm/custom.sh
  CACHE_TOOLCHAIN: true
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: X86_64
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-22.04

    steps:
    - name: 🖥️ 检查服务器性能
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量: $(nproc --all | grep -c '^')"
        echo "CPU核心数量: $(nproc)"
        echo -e "CPU型号信息:$(awk -F: '/model name/ {print $2; exit}' /proc/cpuinfo)\n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息: $(sudo lshw -short -C memory | grep GiB)\n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: 🗂️ 最大化可用空间
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024

    - name: ⚙️ 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi $(docker images -q)
        sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android $AGENT_TOOLSDIRECTORY
        sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204) rename clang libclang-dev llvm-dev
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get -y clean
        sudo timedatectl set-timezone "$TZ"

    - name: ⬇️ 检出仓库
      uses: actions/checkout@main

    - name: 📦 克隆 OpenWrt 源码
      run: |
        git clone --depth=1 --single-branch $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: 🔧 生成设备变量
      run: |
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        
        # 提取源码仓库名（例如 AutoBuild-OpenWrt）
        echo "SOURCE_REPO=$(echo $REPO_URL | awk -F '/' '{print $(NF)}')" >> $GITHUB_ENV

        # 提取设备主架构（例如 x86、qualcommax）
        echo "DEVICE_TARGET=$(grep CONFIG_TARGET_BOARD .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV

        # 提取设备子架构（例如 64、ipq60xx）
        echo "DEVICE_SUBTARGET=$(grep CONFIG_TARGET_SUBTARGET .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV

        # 提取架构包名（例如 x86_64、aarch64_cortex-a53）
        echo "DEVICE_ARCH=$(sed -n 's/^CONFIG_TARGET_ARCH_PACKAGES="\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV

        # 提取设备型号（例如 generic、zn_m2）
        echo "DEVICE_MODEL=$(sed -n 's/^CONFIG_TARGET_PROFILE="DEVICE_\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV
    
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          SUBNET="${{ github.event.inputs.subnet }}"
          [ -z "$SUBNET" ] && SUBNET="2"
        else
          SUBNET="2"
        fi
        echo "SUBNET=$SUBNET" >> $GITHUB_ENV        

    - name: 🛠️ 缓存工具链
      if: env.CACHE_TOOLCHAIN == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: false
        mixkey: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
        prefix: ${{ env.OPENWRT_PATH }}

    - name: 🌱 更新并安装 feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 📜 加载自定义配置和脚本
      env:
        SUBNET: ${{ env.SUBNET }}
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE $OPENWRT_PATH/.config
        chmod +x $GITHUB_WORKSPACE/scripts/*.sh
        chmod +x $CUSTOM_SCRIPT
        cd $OPENWRT_PATH/package/
        $GITHUB_WORKSPACE/scripts/Packages.sh
        $GITHUB_WORKSPACE/scripts/Handles.sh
        $GITHUB_WORKSPACE/$CUSTOM_SCRIPT

    - name: 📥 下载依赖
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 🛠️ 编译固件
      id: compile
      run: |
        cd $OPENWRT_PATH
        mkdir -p files/etc/uci-defaults
        cp $GITHUB_WORKSPACE/scripts/init-settings.sh files/etc/uci-defaults/999-init-settings
        cp $GITHUB_WORKSPACE/scripts/init-tailscale.sh files/etc/uci-defaults/99-init-tailscale
        echo "使用 $(nproc) 核心进行编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
        echo "FILE_DATE=$(date '+%Y.%m.%d')" >> $GITHUB_ENV

    - name: 📊 查看磁盘空间使用情况
      if: always()
      run: df -hT

    - name: 📂 整理并打包 artifacts
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        ls -l
        # echo "KERNEL=$(grep ^kernel *.manifest | cut -d- -f2-3 | tr -d ' ')" >> $GITHUB_ENV
        echo "KERNEL=$(grep '^kernel' *.manifest | sed -n 's/^kernel - \([0-9.]*\)~.*/\1/p')" >> $GITHUB_ENV
        cd $OPENWRT_PATH
        mkdir -p ./artifact/package ./artifact/buildinfo
        find ./bin/packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -f {} ./artifact/package/ \;
        find ./bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.manifest" \) -exec cp -f {} ./artifact/buildinfo/ \;
        cd ./artifact
        tar --transform='s|^package/||' -zcf "${DEVICE_ARCH}_packages.tar.gz" package
        echo "已完成 packages 压缩，KERNEL 变量已写入"

    - name: ⬆️ 上传 Buildinfo Artifact
      if: always()
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_buildinfo
        path: ${{ env.OPENWRT_PATH }}/artifact/buildinfo/

    - name: ⬆️ 上传 Packages Artifact
      if: always()
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_packages
        path: ${{ env.OPENWRT_PATH }}/artifact/*packages.tar.gz

    - name: 🚀 上传固件到 Release
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: R${{ env.DATE }} for ${{ env.DEVICE_TARGET }}
        allowUpdates: true
        tag: ${{ env.DEVICE_TARGET }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          ${{ env.FIRMWARE_PATH }}/*.tar.gz
          ${{ env.FIRMWARE_PATH }}/*combined-efi.img.gz
          ${{ env.FIRMWARE_PATH }}/*.vmdk
          ${{ env.OPENWRT_PATH }}/artifact/*.tar.gz
        body: |
          ### 📋 固件信息
          -  🔧 平台架构: ${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
          -  📦 固件源码: ${{ env.REPO_URL }}
          -  🌿 源码分支: ${{ env.REPO_BRANCH }}
          -  ⚙️ 内核版本: ${{ env.KERNEL }}

    - name: 📢 发送 Telegram 通知
      run: |
        TIME=$(TZ='Asia/Shanghai' date '+%Y/%m/%d %H:%M')
        MESSAGE="${{ env.FIRMWARE_TAG }} 编译完成
        发布时间: $TIME
        发布页面: https://github.com/${{ github.repository }}/releases/tag/${{ env.DEVICE_TARGET }}"
        curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MESSAGE"
