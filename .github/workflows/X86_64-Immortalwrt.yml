name: X86_64 Immortalwrt

on:
  workflow_dispatch:
    inputs:
      subnet:
        description: "默认IP地址:192.168.[].1"
        required: true
        default: "2"
      cache:
        description: "使用缓存"
        required: true
        type: boolean
        default: true
      release:
        description: "上传到RELEASE"
        required: true
        type: boolean
        default: true
  schedule:
    - cron: '0 22 * * 5' # 每周六 6:00（北京时间）自动编译

permissions:
  contents: write
  actions: write

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  CONFIG_FILE: x86_imm/x86.config
  CUSTOM_SCRIPT: x86_imm/custom.sh
  FIRMWARE_TAG: X86_64
  ARCH: amd64
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: 检查服务器性能
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量: $(nproc --all | grep -c '^')"
        echo "CPU核心数量: $(nproc)"
        echo -e "CPU型号信息:$(awk -F: '/model name/ {print $2; exit}' /proc/cpuinfo)\n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息: $(sudo lshw -short -C memory | grep GiB)\n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: 初始化环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt -yqq install dos2unix rename python3-setuptools 
        sudo -E apt -yqq install libfuse-dev
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq autoclean
        sudo -E apt -yqq clean
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: 扩容空间
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024

    - name: 检出仓库
      uses: actions/checkout@main

    - name: 克隆 OpenWrt 源码
      run: |
        git clone --depth=1 --single-branch $REPO_URL -b $REPO_BRANCH openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV

    - name: 生成设备变量
      run: |
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        
        # 提取源码仓库名
        echo "SOURCE_REPO=$(echo $REPO_URL | awk -F '/' '{print $(NF)}')" >> $GITHUB_ENV
        # 提取设备主架构
        echo "DEVICE_TARGET=$(grep CONFIG_TARGET_BOARD .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV
        # 提取设备子架构
        echo "DEVICE_SUBTARGET=$(grep CONFIG_TARGET_SUBTARGET .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV
        # 提取架构包名
        echo "DEVICE_ARCH=$(sed -n 's/^CONFIG_TARGET_ARCH_PACKAGES="\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV
        # 提取设备型号
        echo "DEVICE_MODEL=$(sed -n 's/^CONFIG_TARGET_PROFILE="DEVICE_\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV
        
        # 写入缓存时间 (按周计算：2026-w05)
        echo "CACHE_DATE=$(date +'%Y-w%V')" >> $GITHUB_ENV

    - name: 缓存工具链
      # 仅在 手动触发 且 cache=true 时读取
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.cache == 'true'
      uses: actions/cache@v4
      id: cache-toolchain
      with:
        key: ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.CACHE_DATE }}
        restore-keys: |
          ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: 输出缓存结果
      if: github.event.inputs.cache == 'true'
      run: |
        echo "使用的缓存键: ${{ steps.cache-toolchain.outputs.cache-key }}"
        echo "缓存命中情况: ${{ steps.cache-toolchain.outputs.cache-hit }}"
        echo "缓存目录大小："
        du -sh ${{ env.OPENWRT_PATH }}/.ccache || echo ".ccache 目录不存在"
        du -sh ${{ env.OPENWRT_PATH }}/staging_dir || echo "staging_dir 目录不存在"

    - name: 刷新缓存时间戳
      if: github.event.inputs.cache == 'true'
      run: |
        echo "开始刷新缓存时间戳..."
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
            find "$dir" -type f -exec touch {} +
          done
        fi
        echo "缓存时间戳刷新完成。"

    - name: 设置 Subnet (IP地址)
      run: |
        # 优化后的逻辑：如果是手动触发，使用 inputs；如果是定时，使用默认值 "2"
        if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
          echo "SUBNET=${{ github.event.inputs.subnet }}" >> $GITHUB_ENV
        else
          echo "SUBNET=2" >> $GITHUB_ENV
        fi

    - name: 更新并安装 feeds
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        find ./ -name '*homeproxy*' -exec rm -rf {} +
        ./scripts/feeds install -a

    - name: 加载自定义配置和脚本
      env:
        SUBNET: ${{ env.SUBNET }}
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE $OPENWRT_PATH/.config
        chmod +x $GITHUB_WORKSPACE/scripts/*.sh
        chmod +x $CUSTOM_SCRIPT
        cd $OPENWRT_PATH/package/
        $GITHUB_WORKSPACE/scripts/Packages.sh
        $GITHUB_WORKSPACE/scripts/Handles.sh
        $GITHUB_WORKSPACE/$CUSTOM_SCRIPT

    - name: 下载依赖
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd $OPENWRT_PATH
        mkdir -p files/etc/uci-defaults
        cp $GITHUB_WORKSPACE/scripts/init-settings.sh files/etc/uci-defaults/999-init-settings
        cp $GITHUB_WORKSPACE/scripts/init-tailscale.sh files/etc/uci-defaults/99-init-tailscale
        echo "使用 $(nproc) 核心进行编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
        echo "FILE_DATE=$(date '+%Y.%m.%d')" >> $GITHUB_ENV

    - name: 查看磁盘空间使用情况
      if: always()
      run: df -hT

    - name: 整理并打包 artifacts
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
        ls -l
        echo "KERNEL=$(grep '^kernel' *.manifest | sed -n 's/^kernel - \([0-9.]*\)~.*/\1/p')" >> $GITHUB_ENV
        cd $OPENWRT_PATH
        mkdir -p ./artifact/package ./artifact/buildinfo
        find ./bin/packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -f {} ./artifact/package/ \;
        find ./bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.manifest" \) -exec cp -f {} ./artifact/buildinfo/ \;
        cd ./artifact
        tar --transform='s|^package/||' -zcf "${DEVICE_ARCH}_packages.tar.gz" package
        echo "已完成 packages 压缩，KERNEL 变量已写入"

    - name: 上传 Buildinfo Artifact
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_buildinfo
        path: ${{ env.OPENWRT_PATH }}/artifact/buildinfo/

    - name: 上传 Packages Artifact
      if: steps.compile.outputs.status == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_packages
        path: ${{ env.OPENWRT_PATH }}/artifact/*packages.tar.gz

    - name: 上传固件到 Release
      # 修复点：同时检查 1. 编译成功 2. (手动且勾选了release) 或 (定时任务)
      if: steps.compile.outputs.status == 'success' && (github.event.inputs.release == 'true' || github.event_name == 'schedule')
      uses: ncipollo/release-action@main
      with:
        name: R${{ env.DATE }} for ${{ env.DEVICE_TARGET }}
        allowUpdates: true
        tag: ${{ env.DEVICE_TARGET }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: |
          ${{ env.FIRMWARE_PATH }}/*.tar.gz
          ${{ env.FIRMWARE_PATH }}/*combined-efi.img.gz
          ${{ env.FIRMWARE_PATH }}/*combined.img.gz
          ${{ env.FIRMWARE_PATH }}/*.vmdk
          ${{ env.OPENWRT_PATH }}/artifact/*.tar.gz
        body: |
          ### 📋 固件信息
          -  🔧 平台架构: ${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
          -  📦 固件源码: ${{ env.REPO_URL }}
          -  🌿 源码分支: ${{ env.REPO_BRANCH }}
          -  ⚙️ 内核版本: ${{ env.KERNEL }}

    - name: 发送 Telegram 通知
      # 修复点：条件同上
      if: steps.compile.outputs.status == 'success' && (github.event.inputs.release == 'true' || github.event_name == 'schedule')
      run: |
        DT=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
        DL_LINK="https://github.com/${{ github.repository }}/releases/tag/${{ env.DEVICE_TARGET }}"
        
        MSG="<b>🎉 OpenWrt 固件构建成功</b>
        
        <b>设备信息</b>
        ━━━━━━━━━━━━━━━━━━
        <b>设备型号:</b> <code>${{ env.DEVICE_MODEL }}</code>
        <b>系统架构:</b> ${{ env.DEVICE_TARGET }} / ${{ env.DEVICE_SUBTARGET }}
        <b>内核版本:</b> ${{ env.KERNEL }}
        <b>源码分支:</b> ${{ env.REPO_BRANCH }}
        
        <b>📦 发布详情</b>
        ━━━━━━━━━━━━━━━━━━
        <b>编译时间:</b> $DT
        <a href='$DL_LINK'><b>点击此处跳转下载页面</b></a>"

        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "parse_mode=HTML" \
          -d "disable_web_page_preview=true" \
          --data-urlencode "text=$MSG"

    - name: TG Notification Failure
      if: failure()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ 警告！%0A仓库: ${{ github.repository }}%0A任务: ${{ github.workflow }} 运行失败，请及时检查！"

    - name: 删除旧缓存 (仅定时任务运行)
      if: github.event_name == 'schedule'
      continue-on-error: true
      run: |
        echo "检测到定时构建，准备清理旧缓存以生成新的一周主缓存..."
        gh cache list --key ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          echo "删除旧缓存: $key"
          gh cache delete "$key" || true
        done