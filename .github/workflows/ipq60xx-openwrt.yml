name: ipq60xx

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: "选择编译版本: wifi, nowifi, both"
        required: true
        default: "both"
        type: choice
        options:
          - wifi
          - nowifi
          - both
      subnet_wifi:
        description: "WiFi版默认IP地址:192.168.(X).1 中的X值"
        required: false
        default: "2"
      subnet_nowifi:
        description: "非WiFi版默认IP地址:192.168.(X).1 中的X值"
        required: false
        default: "3"
      cache:
        description: "使用缓存"
        required: true
        type: boolean
        default: true

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: k6.12-nss
  CUSTOM_SCRIPT: ipq6000/custom.sh
  CLASH_KERNEL: arm64
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - variant: wifi
            run_this: ${{ github.event.inputs.build_variant == 'both' || github.event.inputs.build_variant == 'wifi' }}
          - variant: nowifi
            run_this: ${{ github.event.inputs.build_variant == 'both' || github.event.inputs.build_variant == 'nowifi' }}
    steps:
      # 当前 variant 不需要运行时，输出提示并跳过后续步骤
      - name: Check if current variant should run
        run: |
          if [ "${{ matrix.run_this }}" != "true" ]; then
            echo "Skipping build for ${{ matrix.variant }} variant."
          fi

      - name: 检查服务器性能
        if: ${{ matrix.run_this }}
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(nproc --all | grep -c '^')"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(awk -F: '/model name/ {print $2; exit}' /proc/cpuinfo)\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息: $(sudo lshw -short -C memory | grep GiB)\n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: 初始化环境
        if: ${{ matrix.run_this }}
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix rename
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload
          sudo timedatectl set-timezone "$TZ"

      - name: 扩容空间
        if: ${{ matrix.run_this }}
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 100
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 检出仓库
        if: ${{ matrix.run_this }}
        uses: actions/checkout@main

      - name: 克隆 OpenWrt 源码
        if: ${{ matrix.run_this }}
        run: |
          df -hT $GITHUB_WORKSPACE
          git clone --shallow-since=2025-02-23 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          # 固定到某个 commit（可根据需要修改）
          # git reset --hard 3d4e207b4cb3fb1cf0c66406650171f353477e01
          echo -e "\e[32mCurrent commit: $(git rev-parse HEAD)\e[0m"

      - name: 区分型号
        if: ${{ matrix.run_this }}
        run: |
          if [ "${{ matrix.variant }}" == "wifi" ]; then
            echo "CONFIG_FILE=ipq6000/k612_wifi_m2.config" >> $GITHUB_ENV
            echo "FIRMWARE_TAG=ipq6000" >> $GITHUB_ENV
            echo "RENAME_PREFIX=" >> $GITHUB_ENV
            echo "SUBNET=${{ github.event.inputs.subnet_wifi }}" >> $GITHUB_ENV
          else
            echo "CONFIG_FILE=ipq6000/k612_nowifi_m2.config" >> $GITHUB_ENV
            echo "FIRMWARE_TAG=ipq6000" >> $GITHUB_ENV
            echo "RENAME_PREFIX=nowifi-" >> $GITHUB_ENV
            echo "SUBNET=${{ github.event.inputs.subnet_nowifi }}" >> $GITHUB_ENV
          fi

      - name: 生成设备变量
        if: ${{ matrix.run_this }}
        run: |
          cp $CONFIG_FILE $OPENWRT_PATH/.config
          cd $OPENWRT_PATH
          make defconfig > /dev/null 2>&1
          
          # 提取源码仓库名（例如 AutoBuild-OpenWrt）
          echo "SOURCE_REPO=$(echo $REPO_URL | awk -F '/' '{print $(NF)}')" >> $GITHUB_ENV

          # 提取设备主架构（例如 x86、qualcommax）
          echo "DEVICE_TARGET=$(grep CONFIG_TARGET_BOARD .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV

          # 提取设备子架构（例如 64、ipq60xx）
          echo "DEVICE_SUBTARGET=$(grep CONFIG_TARGET_SUBTARGET .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV

          # 提取架构包名（例如 x86_64、aarch64_cortex-a53）
          echo "DEVICE_ARCH=$(sed -n 's/^CONFIG_TARGET_ARCH_PACKAGES="\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV

          # 提取设备型号（例如 generic、zn_m2）
          echo "DEVICE_MODEL=$(sed -n 's/^CONFIG_TARGET_PROFILE="DEVICE_\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV
          
          # 写入缓存时间
          echo "CACHE_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: 缓存工具链
        if: github.event.inputs.cache == 'true'
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          key: ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.CACHE_DATE }}
          restore-keys: |
            ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
          path: |
            ${{ env.OPENWRT_PATH }}/.ccache
            ${{ env.OPENWRT_PATH }}/staging_dir

      - name: 输出缓存结果
        if: github.event.inputs.cache == 'true'
        run: |
          echo "使用的缓存键: ${{ steps.cache-toolchain.outputs.cache-key }}"
          echo "缓存命中情况: ${{ steps.cache-toolchain.outputs.cache-hit }}"
          echo "缓存目录大小："
          du -sh ${{ env.OPENWRT_PATH }}/.ccache || echo ".ccache 目录不存在"
          du -sh ${{ env.OPENWRT_PATH }}/staging_dir || echo "staging_dir 目录不存在"

      - name: 刷新缓存时间戳
        if: github.event.inputs.cache == 'true'
        run: |
          echo "开始刷新缓存时间戳..."
          if [ -d "$OPENWRT_PATH/staging_dir" ]; then
            find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
            done
          fi
          echo "缓存时间戳刷新完成。"

      - name: 更新并安装 feeds
        if: ${{ matrix.run_this }}
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a  
          ./scripts/feeds install -a       

      - name: 加载自定义配置和脚本
        if: ${{ matrix.run_this }}
        env:
          SUBNET: ${{ env.SUBNET }}
        run: |
          if [ -f "$CONFIG_FILE" ]; then
            mv $CONFIG_FILE $OPENWRT_PATH/.config
          fi
          chmod +x $GITHUB_WORKSPACE/scripts/*.sh $CUSTOM_SCRIPT
          cd $OPENWRT_PATH/package/
          $GITHUB_WORKSPACE/scripts/Packages.sh
          $GITHUB_WORKSPACE/scripts/Handles.sh
          $GITHUB_WORKSPACE/$CUSTOM_SCRIPT
          $GITHUB_WORKSPACE/scripts/patch-tailscale.sh

      - name: 下载依赖
        if: ${{ matrix.run_this }}
        run: |
          cd $OPENWRT_PATH
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件
        if: ${{ matrix.run_this }}
        id: compile
        run: |
          cd $OPENWRT_PATH
          mkdir -p files/etc/uci-defaults
          cp $GITHUB_WORKSPACE/scripts/init-settings.sh files/etc/uci-defaults/999-init-settings
          cp $GITHUB_WORKSPACE/scripts/init-tailscale.sh files/etc/uci-defaults/99-init-tailscale
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 整理文件
        if: ${{ matrix.run_this && steps.compile.outputs.status == 'success' }}
        run: |         
          cd $OPENWRT_PATH
          mkdir -p ./artifact/package ./artifact/buildinfo
          find ./bin/packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -f {} ./artifact/package/ \;
          find ./bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.manifest" \) -exec cp -f {} ./artifact/buildinfo/ \;
          cd ./artifact
          tar --transform='s|^package/||' -zcf "${DEVICE_ARCH}_packages.tar.gz" package
          
          cd $OPENWRT_PATH/bin/targets/*/*
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          # $GITHUB_WORKSPACE/scripts/cleanup_targets.sh
          echo "KERNEL=$(grep '^kernel' *.manifest | sed -n 's/^kernel - \([0-9.]*\)~.*/\1/p')" >> $GITHUB_ENV
          # rename -v "s/^/R$(date +'%y.%m.%d')-${{ env.RENAME_PREFIX }}/" *.ubi
          # rename -v "s/^/R$(date +'%y.%m.%d')-${{ env.RENAME_PREFIX }}/" *.bin
          rename -v "s/^/${{ env.RENAME_PREFIX }}/" *.ubi
          rename -v "s/^/${{ env.RENAME_PREFIX }}/" *.bin          
          echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
          echo "DATE1=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      - name: 上传所有产物到 Artifact
        if: ${{ matrix.run_this && steps.compile.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}
          path: |
            ${{ env.OPENWRT_PATH }}/artifact/**
            ${{ env.FIRMWARE_PATH }}/*squashfs-factory.ubi
            ${{ env.FIRMWARE_PATH }}/*squashfs-sysupgrade.bin
          compression-level: 9
          if-no-files-found: ignore
          overwrite: true

      - name: 上传 Firmware 到 Release
        if: ${{ matrix.run_this && steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true' }}
        uses: ncipollo/release-action@main
        with:
          name: R${{ env.DATE }} for ${{ env.DEVICE_TARGET }}
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ env.DEVICE_TARGET }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            ${{ env.OPENWRT_PATH }}/artifact/*.tar.gz
            ${{ env.FIRMWARE_PATH }}/*squashfs-factory.ubi
            ${{ env.FIRMWARE_PATH }}/*squashfs-sysupgrade.bin
          body: |
            ### 📋 固件信息
            -  🔧 平台架构: ${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
            -  📦 固件源码: ${{ env.REPO_URL }}
            -  🌿 源码分支: ${{ env.REPO_BRANCH }}
            -  ⚙️ 内核版本: ${{ env.KERNEL }}

      - name: 发送 Telegram 通知
        if: ${{ matrix.run_this && steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true' }}
        run: |
          CURRENT_DATE_TIME=$(TZ='Asia/Shanghai' date +'%Y/%m/%d %r')
          MESSAGE="${{ env.DEVICE_MODEL }} 固件编译完成
          发布时间：$CURRENT_DATE_TIME
          发布页面：https://github.com/acnixuil/AutoBuild_OP/releases/tag/${{ env.DEVICE_TARGET }}"
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE"

      - name: 删除旧缓存
        if: github.event.inputs.cache == 'true'
        run: |
          echo "开始列出并删除旧缓存..."
          gh cache list --key ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
            echo "删除缓存：$key"
            gh cache delete "$key"
          done
          echo "当前缓存使用情况："
          echo "ccache 目录大小: $(du -sh ${{ env.OPENWRT_PATH }}/.ccache | cut -f 1)"
          echo "staging_dir 目录大小: $(du -sh ${{ env.OPENWRT_PATH }}/staging_dir | cut -f 1)"
