name: 🧩 IPQ60xx 固件编译触发器

on:
  # 1. 定时触发器：北京时间周六早上 6 点 30 分 (UTC 22:30 Friday)
  schedule:
    - cron: '30 22 * * 5' 
  # 2. 手动触发器
  workflow_dispatch:
    inputs:
      build_variant:
        description: "选择编译版本: wifi, nowifi, both"
        required: false
        default: "both"
        type: choice
        options:
          - wifi
          - nowifi
          - both
      subnet_wifi:
        description: "WiFi版默认IP地址:192.168.(X).1 中的X值"
        required: false
        default: "2"
        type: string
      subnet_nowifi:
        description: "非WiFi版默认IP地址:192.168.(X).1 中的X值"
        required: false
        default: "3"
        type: string
      cache:
        description: "使用缓存 (定时触发时，强制不使用旧缓存但会生成新缓存)"
        required: false
        type: boolean
        default: true

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  REPO_BRANCH: k6.12-nss
  CUSTOM_SCRIPT: ipq6000/custom.sh
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  set_context:
    # 新增一个 Job 来设置所有上下文变量，包括矩阵所需的变量
    runs-on: ubuntu-22.04
    outputs:
      subnet_wifi: ${{ steps.set_vars.outputs.subnet_wifi }}
      subnet_nowifi: ${{ steps.set_vars.outputs.subnet_nowifi }}
      build_variant: ${{ steps.set_vars.outputs.build_variant }}
      cache_enabled: ${{ steps.set_vars.outputs.cache_enabled }}
      cache_key_date: ${{ steps.set_vars.outputs.cache_key_date }}
      date: ${{ steps.set_vars.outputs.date }}
      
    steps:
      - name: 设置统一输入和时间变量
        id: set_vars
        run: |
          # 1. 确定触发方式
          IS_SCHEDULE="${{ github.event_name == 'schedule' }}"
          
          # 2. 统一输入变量 (非手动触发时使用默认值)
          BUILD_VARIANT="${{ github.event.inputs.build_variant || 'both' }}"
          SUBNET_WIFI="${{ github.event.inputs.subnet_wifi || '2' }}"
          SUBNET_NOWIFI="${{ github.event.inputs.subnet_nowifi || '3' }}"
          CACHE_INPUT="${{ github.event.inputs.cache }}"
          
          # 3. 缓存逻辑
          if [ "$CACHE_INPUT" == "false" ]; then
              CACHE_ENABLED="false"
          else
              CACHE_ENABLED="true"
          fi

          # 4. 缓存 Key 日期逻辑: 
          if [ "$IS_SCHEDULE" == "true" ] || [ "$CACHE_INPUT" == "false" ]; then
              CACHE_KEY_DATE=$(TZ='Asia/Shanghai' date +'%Y%m%d') 
          else
              CACHE_KEY_DATE='20250223'
          fi
          
          # 5. 格式化日期变量
          DATE_TIME_SH=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S') 

          echo "build_variant=$BUILD_VARIANT" >> $GITHUB_OUTPUT
          echo "subnet_wifi=$SUBNET_WIFI" >> $GITHUB_OUTPUT
          echo "subnet_nowifi=$SUBNET_NOWIFI" >> $GITHUB_OUTPUT
          echo "cache_enabled=$CACHE_ENABLED" >> $GITHUB_OUTPUT
          echo "cache_key_date=$CACHE_KEY_DATE" >> $GITHUB_OUTPUT
          echo "date=$DATE_TIME_SH" >> $GITHUB_OUTPUT 
          
  call_build:
    needs: set_context # 依赖 set_context Job 获取输出变量
    runs-on: ubuntu-22.04
    
    # 将 set_context 的输出变量提升为 Job 级的环境变量
    env:
      BUILD_VARIANT: ${{ needs.set_context.outputs.build_variant }}
      SUBNET_WIFI: ${{ needs.set_context.outputs.subnet_wifi }}
      SUBNET_NOWIFI: ${{ needs.set_context.outputs.subnet_nowifi }}
      CACHE_ENABLED: ${{ needs.set_context.outputs.cache_enabled }}
      CACHE_KEY_DATE: ${{ needs.set_context.outputs.cache_key_date }}
      DATE: ${{ needs.set_context.outputs.date }}
    
    strategy:
      matrix:
        include:
          # WIFI 变体
          - variant: wifi
            config_file: ipq6000/k612_wifi_m2.config
            rename_prefix: ""
            # 现在可以引用 Job 级环境变量
            subnet: ${{ env.SUBNET_WIFI }}
            # 条件判断也基于 Job 级环境变量
            run_this: ${{ env.BUILD_VARIANT == 'both' || env.BUILD_VARIANT == 'wifi' }}
          # NOWIFI 变体
          - variant: nowifi
            config_file: ipq6000/k612_nowifi_m2.config
            rename_prefix: "nowifi-"
            subnet: ${{ env.SUBNET_NOWIFI }}
            run_this: ${{ env.BUILD_VARIANT == 'both' || env.BUILD_VARIANT == 'nowifi' }}
      fail-fast: false
      
    if: ${{ matrix.run_this }} # L111 修正：这里对 matrix.run_this 的引用是正确的
    
    # L113, L114, L133 修正：uses, with, secrets 必须直接在 job 下
    uses: ./.github/workflows/core-build-openwrt.yml
    with:
      # 传递通用配置
      repo_url: ${{ env.REPO_URL }}
      repo_branch: ${{ env.REPO_BRANCH }}
      custom_script: ${{ env.CUSTOM_SCRIPT }}
      firmware_release: ${{ env.FIRMWARE_RELEASE }}
      tz: ${{ env.TZ }}
      # 传递 set_context Job 的输出
      cache_enabled: ${{ env.CACHE_ENABLED }}
      
      # 传递矩阵变量 (设备配置)
      variant: ${{ matrix.variant }}
      subnet: ${{ matrix.subnet }}
      config_file: ${{ matrix.config_file }} 
      rename_prefix: ${{ matrix.rename_prefix }}
      
      # 传递统一的时间戳和日期
      cache_key_date: ${{ env.CACHE_KEY_DATE }}
      date: ${{ env.DATE }}