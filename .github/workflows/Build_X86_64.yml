name: Build_x86_64

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      checkupdates515:
        description: 'еҶ…ж ёзүҲжң¬5.15'
        required: true
        default: 'false'
        type: choice
        options:
        - false
        - true
      checkupdates61:
        description: 'еҶ…ж ёзүҲжң¬6.1'
        required: true
        default: 'false'
        type: choice
        options:
        - false
        - true
      checkconfigfile:
        description: 'йҖүжӢ©й…ҚзҪ®ж–Үд»¶'
        required: true
        default: 'rc'
        type: choice
        options:
        - rc
        - beta       
      ssh515:
        description: 'SSH515 connection to Actions'
        required: false
        default: 'false'
      ssh61:
        description: 'SSH61 connection to Actions'
        required: false
        default: 'false'
#  schedule:
#    - cron: 58 18 * * *

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: x86/x86-ipv6.config
  CONFIG_BETA_FILE: x86/test.config
  DIY_P1_SH: x86/x86-part1.sh
  DIY_P2_SH: x86/x86-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_CONFIG: true
  UPLOAD_FIRMWARE: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  FILE_NAME: x86_64
  PRODUCT_NAME: x86_64

jobs:        
# =================================================================================================
  Build_x86_64_515:
    if: github.event.inputs.checkupdates515 == 'true'
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Check server configuration
      run: |
        echo "иӯҰе‘Ҡвҡ "
        echo "иӢҘеҲҶй…Қзҡ„жңҚеҠЎеҷЁжҖ§иғҪдёҚи¶іпјҢеҠЎеҝ…еҸҠж—¶еҸ–ж¶ҲпјҢйҮҚж–°иҝҗиЎҢпјҒ"
        echo "е·ІзҹҘзј–иҜ‘жҲҗеҠҹCPUеһӢеҸ·пјҡ8370C,8171M"
        echo "е·ІзҹҘжҖ§иғҪдёҚи¶іCPUеһӢеҸ·пјҡ8272CL"
        echo -e "-------------- ------------CPUдҝЎжҒҜ------------------------------------------\n"
        echo "CPUзү©зҗҶж•°йҮҸ:$(cat /proc/cpuinfo| grep "physical id"| sort| uniq| wc -l)"
        echo -e "CPUж ёеҝғеҸҠзүҲжң¬дҝЎжҒҜпјҡ$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "-------------------------------еҶ…еӯҳдҝЎжҒҜ-------------------------------------------"
        echo "е·Іе®үиЈ…еҶ…еӯҳиҜҰз»ҶдҝЎжҒҜпјҡ"
        sudo lshw -short -C memory | grep GiB
        echo -e "\n"
        echo "-----------------------------зЎ¬зӣҳдҝЎжҒҜ---------------------------------------------"
        echo -e  "зЎ¬зӣҳж•°йҮҸпјҡ$(ls /dev/sd* | grep -v [1-9] | wc -l) \n"
        echo "зЎ¬зӣҳиҜҰжғ…пјҡ"
        echo " зі»з»ҹз©әй—ҙ       зұ»еһӢ   жҖ»ж•°  е·Із”Ё  еҸҜз”Ё  дҪҝз”ЁзҺҮ"
        df -Th

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.eu.org/init_build_environment.sh)'
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir     

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        Author=$(git show -s --date=short --format="%an")
        Date=$(git show -s --date=short --format="%ci")
        Commit=$(git show -s --date=short --format="%s")
        Hash=$(git show -s --date=short --format="%H")
        echo "author=$Author" >> $GITHUB_ENV
        echo "date=$Date" >> $GITHUB_ENV
        echo "commit=$Commit" >> $GITHUB_ENV
        echo "hash=$Hash" >> $GITHUB_ENV
        echo "DATE=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "TAG=$(date "+%Y%m%d")" >> $GITHUB_ENV
        echo "start=$(date +%s)" >> $GITHUB_ENV

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: иҜ»еҸ–RCзүҲconfig
      if: github.event.inputs.checkconfigfile == 'rc' 
      run: |     
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config   
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH       
        sed -i 's/CONFIG_LINUX.*/CONFIG_LINUX_5_15=y/g' .config       
        sed -i 's/KERNEL_PATCHVER:=*.*/KERNEL_PATCHVER:=5.15/g' target/linux/x86/Makefile
        sed -i 's/KERNEL_TESTING_PATCHVER:=*.*/KERNEL_TESTING_PATCHVER:=5.15/g' target/linux/x86/Makefile
        
    - name: иҜ»еҸ–BETAзүҲconfig
      if: github.event.inputs.checkconfigfile == 'beta' 
      run: |     
        [ -e files ] && mv files openwrt/files      
        [ -e $CONFIG_BETA_FILE ] && mv $CONFIG_BETA_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH      
        sed -i 's/CONFIG_LINUX.*/CONFIG_LINUX_5_15=y/g' .config        
        sed -i 's/KERNEL_PATCHVER:=*.*/KERNEL_PATCHVER:=5.15/g' target/linux/x86/Makefile
        sed -i 's/KERNEL_TESTING_PATCHVER:=*.*/KERNEL_TESTING_PATCHVER:=5.15/g' target/linux/x86/Makefile

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@v1.0.0
      if: (github.event.inputs.ssh515 == 'true' && github.event.inputs.ssh515 != 'false') || contains(github.event.action, 'ssh515')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Output compilation information
      run: |
        cd openwrt
        echo " зі»з»ҹз©әй—ҙ       зұ»еһӢ  жҖ»ж•°  е·Із”Ё  еҸҜз”Ё  дҪҝз”ЁзҺҮ"
        df -hT $PWD
        echo
        echo "=========================================="
        grep -i CONFIG_PACKAGE_luci-app .config | grep  -v \# > Plug-in
        grep -i CONFIG_PACKAGE_luci-theme .config | grep  -v \# >> Plug-in
        sed -i '/INCLUDE/d' Plug-in > /dev/null 2>&1
        sed -i 's/CONFIG_PACKAGE_/гҖҒ/g' Plug-in
        sed -i '/Transparent_Proxy/d' Plug-in > /dev/null 2>&1
        sed -i 's/=y/\ /g' Plug-in
        awk '$0=NR$0' Plug-in > Plug-2
        awk '{print "	" $0}' Plug-2 > Plug-in
        echo
        echo
        echo "	      е·ІйҖүжҸ’д»¶еҲ—иЎЁ"
        cat Plug-in
        rm -rf {Plug-in,Plug-2}
        echo
        echo "=========================================="
        echo
        echo
        echo "иҫ“еҮәе®Ңж•ҙжҸ’д»¶дҝЎжҒҜ..."
        echo
        echo
        cat .config

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s || (curl -k --data chat_id="${{ env.TELEGRAM_CHAT_ID }}" --data "text=рҹҳ… ${{env.PRODUCT_NAME}}-OpenWrt еӣәд»¶зј–иҜ‘еӨұиҙҘ рҹҳ…" "https://api.telegram.org/bot${{ env.TELEGRAM_TOKEN }}/sendMessage";exit 1)
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      run: |
        echo "=========================================="
        echo "----------------з©әй—ҙдҪҝз”Ё-------------------"
        echo "=========================================="
        echo " зі»з»ҹз©әй—ҙ      зұ»еһӢ   жҖ»ж•°  е·Із”Ё  еҸҜз”Ё дҪҝз”ЁзҺҮ"
        df -hT
        echo "=========================================="
        du -h --max-depth=1 openwrt/ --exclude=build_dir --exclude=bin
        du -h --max-depth=1 openwrt/build_dir
        du -h --max-depth=1 openwrt/bin

    - name: Organize firmware files
      id: organizer
      run: |
        mkdir -p ./artifact/buildinfo
        cp -rf openwrt/.config ./artifact/buildinfo/x86.config
        cp -rf $(find openwrt/bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: env.UPLOAD_BIN_DIR == 'true' && steps.compile.outputs.status == 'success'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Upload config
      uses: actions/upload-artifact@main
      if: env.UPLOAD_CONFIG == 'true' && steps.compile.outputs.status == 'success'
      with:
        name: x86-515-config
        path: ./artifact/buildinfo/

    - name: Delete files
      run: |
        cd openwrt
        bash  rename.sh
        Kernel=`grep "_uefi.img.gz" wget/open_dev_md5 | cut -d - -f 2 | cut -d _ -f 2 `
        echo "KERNEL=$Kernel" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: env.UPLOAD_FIRMWARE == 'true' && steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Create release
      id: release
      uses: ncipollo/release-action@v1
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      with:
        name: ${{ env.DATE }} гҖҢ ${{ env.FILE_NAME }}_${{ env.KERNEL }} гҖҚеӣәд»¶
        allowUpdates: true
        tag: ${{ env.TAG }}_${{ env.KERNEL }}
        token: ${{ secrets.G_TOKEN }}
        body: |
          - рҹ”– жӯӨдёә ${{ env.FILE_NAME }}_${{ env.KERNEL }} еӣәд»¶
          - рҹ”– й»ҳи®ӨIPпјҡ192.168.3.1 й»ҳи®ӨеҜҶз Ғпјҡж— еҜҶз Ғ
          - рҹ”– ж„ҹи°ўжәҗз ҒдҪңиҖ…ж— з§ҒеҲҶдә«пјҒ
          - рҹ”– ж—¶й—ҙ: ${{ env.date }}
          - рҹ”– hash: ${{ env.hash }}
        artifacts: ${{ env.FIRMWARE }}/*

    - name: Completion time 
      run: |
        echo "DATE1=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        end=$(date +%s)
        seconds=$(( end - start ))
        hour=$(( $seconds/3600 ))
        min=$(( ($seconds-${hour}*3600)/60 ))
        sec=$(( $seconds-${hour}*3600-${min}*60 ))
        HMS=`echo ${hour}:${min}:${sec}`
        echo "time=$HMS" >> $GITHUB_ENV

    - name: Telegram or Push notification
      run: |
        MSG="
        рҹҳә ${{ env.FILE_NAME }}_${{ env.KERNEL }} зј–иҜ‘е®ҢжҲҗ
        рҹ”– ејҖе§Ӣж—¶й—ҙпјҡ${{ env.DATE }}
        рҹ”– е®ҢжҲҗж—¶й—ҙпјҡ${{ env.DATE1 }}
        рҹ”– зј–иҜ‘иҖ—ж—¶пјҡ${{ env.time }}
        вҸұ ж—¶й—ҙ: ${{ env.date }}
        вҢӣ hash: ${{ env.hash }}
        рҹҺҒ: https://github.com/acnixuil/Snapshot-Lede/releases/tag/${{ env.TAG }}_${{ env.KERNEL }}
        "
        curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}"
        curl "http://www.pushplus.plus/send?token=${{ secrets.PUSH_PLUS_TOKEN }}" -d "title=${{ env.FILE_NAME }}_${{ env.KERNEL }} зј–иҜ‘е®ҢжҲҗ&content=${MSG}"

