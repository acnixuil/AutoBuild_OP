      if: env.UPLOAD_CONFIG == 'true' && steps.compile.outputs.status == 'success'
      with:
        name: x86-61-config
        path: ./artifact/buildinfo/

    - name: Delete files
      run: |
        cd openwrt 
        bash  rename.sh
        Kernel=`grep "_uefi.img.gz" wget/open_dev_md5 | cut -d - -f 2 | cut -d _ -f 2 `
        echo "KERNEL=$Kernel" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: env.UPLOAD_FIRMWARE == 'true' && steps.organize.outputs.status == 'success'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Create release
      id: release
      uses: ncipollo/release-action@v1
      if: env.UPLOAD_RELEASE == 'true' && steps.compile.outputs.status == 'success'
      with:
        name: ${{ env.DATE }} гҖҢ ${{ env.FILE_NAME }}_${{ env.KERNEL }}гҖҚеӣәд»¶
        allowUpdates: true
        removeArtifacts: true
        tag: ${{ env.TAG }}_${{ env.KERNEL }}
        token: ${{ secrets.G_TOKEN }}
        body: |
          - рҹ”– жӯӨдёә ${{ env.FILE_NAME }}_${{ env.KERNEL }} еӣәд»¶
          - рҹ”– й»ҳи®ӨIPпјҡ192.168.3.1 й»ҳи®ӨеҜҶз Ғпјҡж— еҜҶз Ғ
          - рҹ”– ж„ҹи°ўжәҗз ҒдҪңиҖ…ж— з§ҒеҲҶдә«пјҒ
          - рҹ”– ж—¶й—ҙ: ${{ env.date }}
          - рҹ”– hash: ${{ env.hash }}
        artifacts: ${{ env.FIRMWARE }}/*

    - name: Completion time 
      run: |
        echo "DATE1=$(date "+%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        end=$(date +%s)
        seconds=$(( end - start ))
        hour=$(( $seconds/3600 ))
        min=$(( ($seconds-${hour}*3600)/60 ))
        sec=$(( $seconds-${hour}*3600-${min}*60 ))
        HMS=`echo ${hour}:${min}:${sec}`
        echo "time=$HMS" >> $GITHUB_ENV

    - name: Telegram or Push notification
      run: |
        MSG="
        рҹҳә ${{ env.FILE_NAME }}_${{ env.KERNEL }} зј–иҜ‘е®ҢжҲҗ
        рҹ”– ејҖе§Ӣж—¶й—ҙпјҡ${{ env.DATE }}
        рҹ”– е®ҢжҲҗж—¶й—ҙпјҡ${{ env.DATE1 }}
        рҹ”– зј–иҜ‘иҖ—ж—¶пјҡ${{ env.time }}
        вҸұ ж—¶й—ҙ: ${{ env.date }}
        вҢӣ hash: ${{ env.hash }}
        рҹҺҒ: https://github.com/acnixuil/Snapshot-Lede/releases/tag/${{ env.TAG }}_${{ env.KERNEL }}
        "
        curl "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}"
        
# =================================================================================================
  Cleaning:
    if: ${{ always() }}
    needs: [Build_x86_64_515,Build_x86_64_61]
    runs-on: ubuntu-latest
    steps:
    - name: Delete workflow runs
      uses: Jejz168/delete-workflow-runs@main
      with:
        retain_days: 8
        keep_minimum_runs: 2

    - name: Remove old Releases
      uses: Jejz168/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' 
      with:
        keep_latest: 36
        delete_tags: true
        delete_tag_pattern: _
      env:
        GITHUB_TOKEN: ${{ secrets.G_TOKEN }}
