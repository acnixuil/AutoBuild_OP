name: ⚙️ OpenWrt 核心编译流程 (可复用)

on:
  # 仅通过 workflow_call 触发
  workflow_call:
    inputs:
      # OpenWrt 源码信息
      repo_url:
        required: true
        type: string
        description: "OpenWrt 源码仓库 URL"
      repo_branch:
        required: true
        type: string
        description: "OpenWrt 源码分支"
      custom_script:
        required: true
        type: string
        description: "自定义配置脚本路径 (当前仓库相对路径)"
      # 通用配置
      firmware_release:
        required: true
        type: boolean
        description: "是否上传到 GitHub Release"
      tz:
        required: true
        type: string
        description: "时区设置 (固定为 Asia/Shanghai)"
      cache_enabled:
        required: true
        type: boolean
        description: "是否使用缓存"
      # 当前编译任务的变体信息 (设备配置)
      variant:
        required: true
        type: string
        description: "当前编译的变体 (wifi 或 nowifi)"
      subnet:
        required: true
        type: string
        description: "当前变体的默认 IP 子网值"
      config_file:
        required: true
        type: string
        description: "设备配置文件的路径 (相对于触发器仓库)"
      rename_prefix:
        required: true
        type: string
        description: "固件名称的前缀 (例如: nowifi-)"
      # 统一的时间戳和日期
      cache_key_date: # 用于缓存Key的日期
        required: true
        type: string
      date: # 格式化日期时间 (SH)，用于 Release Name 和通知
        required: true
        type: string
    # 继承调用方的所有 secrets
    secrets: inherit 

env:
  # 将输入参数提升为环境变量，便于在步骤中使用
  REPO_URL: ${{ inputs.repo_url }}
  REPO_BRANCH: ${{ inputs.repo_branch }}
  CUSTOM_SCRIPT: ${{ inputs.custom_script }}
  FIRMWARE_RELEASE: ${{ inputs.firmware_release }}
  TZ: ${{ inputs.tz }}
  SUBNET: ${{ inputs.subnet }}
  CONFIG_FILE: ${{ inputs.config_file }}
  RENAME_PREFIX: ${{ inputs.rename_prefix }}
  
  CACHE_KEY_DATE: ${{ inputs.cache_key_date }}
  DATE: ${{ inputs.date }} # 用于 Release Name/通知

  CLASH_KERNEL: arm64
  FIRMWARE_TAG: ipq6000 

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      # 1. 检出当前仓库 (获取编译脚本)
      - name: 检出当前仓库 (获取编译脚本)
        uses: actions/checkout@v4

      # 2. 检查服务器性能
      - name: 检查服务器性能
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(nproc --all | grep -c '^')"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(awk -F: '/model name/ {print $2; exit}' /proc/cpuinfo)\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息: $(sudo lshw -short -C memory | grep GiB)\n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      # 3. 扩容空间
      - name: 扩容空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 100
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # 4. 部署环境
      - name: 部署环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -y update
          sudo -E apt-get -y install $(curl -fsSL is.gd/depends_ubuntu_2204) rename
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get -y clean
          sudo timedatectl set-timezone "$TZ"

      # 5. 克隆 OpenWrt 源码
      - name: 克隆 OpenWrt 源码
        run: |
          df -hT $GITHUB_WORKSPACE
          git clone --shallow-since=2025-02-23 -b $REPO_BRANCH $REPO_URL openwrt
          cd openwrt
          echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
          echo -e "\e[32mCurrent commit: $(git rev-parse HEAD)\e[0m"

      # 6. 生成设备变量
      - name: 生成设备变量 (获取架构信息)
        run: |
          cp $CONFIG_FILE $OPENWRT_PATH/.config
          cd $OPENWRT_PATH
          make defconfig > /dev/null 2>&1
          
          echo "SOURCE_REPO=$(echo $REPO_URL | awk -F '/' '{print $(NF)}')" >> $GITHUB_ENV
          echo "DEVICE_TARGET=$(grep CONFIG_TARGET_BOARD .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV
          echo "DEVICE_SUBTARGET=$(grep CONFIG_TARGET_SUBTARGET .config | awk -F '\"' '{print $2}')" >> $GITHUB_ENV
          echo "DEVICE_ARCH=$(sed -n 's/^CONFIG_TARGET_ARCH_PACKAGES="\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV
          echo "DEVICE_MODEL=$(sed -n 's/^CONFIG_TARGET_PROFILE="DEVICE_\([^"]*\)"/\1/p' .config)" >> $GITHUB_ENV

      # 7. 缓存工具链
      - name: 缓存工具链
        if: ${{ inputs.cache_enabled == true }}
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          key: ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.CACHE_KEY_DATE }}
          restore-keys: |
            ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
          path: |
            ${{ env.OPENWRT_PATH }}/.ccache
            ${{ env.OPENWRT_PATH }}/staging_dir

      # 8. 输出缓存结果
      - name: 输出缓存结果
        run: |
          echo "使用的缓存键: ${{ steps.cache-toolchain.outputs.cache-key }}"
          echo "缓存命中情况: ${{ steps.cache-toolchain.outputs.cache-hit }}"
          du -sh ${{ env.OPENWRT_PATH }}/.ccache || echo ".ccache 目录不存在"
          du -sh ${{ env.OPENWRT_PATH }}/staging_dir || echo "staging_dir 目录不存在"

      # 9. 移除 stale toolchain stamps
      - name: 移除 stale toolchain stamps
        run: |
          echo "移除 OpenWrt build stamps 以避免误用旧缓存"
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | xargs rm -rf 2>/dev/null || true

      # 10. 更新并安装 feeds
      - name: 更新并安装 feeds
        run: |
          cd $OPENWRT_PATH
          ./scripts/feeds update -a  
          ./scripts/feeds install -a 
        
      # 11. 加载自定义配置和脚本
      - name: 加载自定义配置和脚本
        env:
          SUBNET: ${{ env.SUBNET }}
        run: |
          # 确保配置文件被最终确认 (可删除，因步骤 6 已完成，但保留增加健壮性)
          if [ -f "$CONFIG_FILE" ]; then
            cp $CONFIG_FILE $OPENWRT_PATH/.config
          fi
          
          # 确保所有脚本可执行
          chmod +x $GITHUB_WORKSPACE/scripts/*.sh $CUSTOM_SCRIPT
          
          # 运行自定义脚本来修改源码或配置
          cd $OPENWRT_PATH/package/
          $GITHUB_WORKSPACE/scripts/Packages.sh
          $GITHUB_WORKSPACE/scripts/Handles.sh
          $GITHUB_WORKSPACE/$CUSTOM_SCRIPT
          $GITHUB_WORKSPACE/scripts/patch-tailscale.sh

      # 12. 下载依赖
      - name: 下载依赖
        run: |
          cd $OPENWRT_PATH
          make defconfig
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      # 13. 编译固件
      - name: 编译固件
        id: compile
        run: |
          cd $OPENWRT_PATH
          mkdir -p files/etc/uci-defaults
          cp $GITHUB_WORKSPACE/scripts/init-settings.sh files/etc/uci-defaults/999-init-settings
          cp $GITHUB_WORKSPACE/scripts/init-tailscale.sh files/etc/uci-defaults/99-init-tailscale
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          
      # 14. 整理文件 (生成用于文件名的日期)
      - name: 整理文件
        if: ${{ steps.compile.outputs.status == 'success' }}
        run: |          
          cd $OPENWRT_PATH
          mkdir -p ./artifact/package ./artifact/buildinfo
          find ./bin/packages/ -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -f {} ./artifact/package/ \;
          find ./bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.manifest" \) -exec cp -f {} ./artifact/buildinfo/ \;
          cd ./artifact
          tar --transform='s|^package/||' -zcf "${DEVICE_ARCH}_packages.tar.gz" package
          
          # 生成编译完成后的日期时间戳 (用于 Artifact Name)
          DATE_TIME_FILENAME=$(TZ='${{ env.TZ }}' date +'%Y-%m-%d_%H-%M-%S')
          echo "DATE_FILENAME=$DATE_TIME_FILENAME" >> $GITHUB_ENV
          
          cd $OPENWRT_PATH/bin/targets/*/*
          echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV
          echo "KERNEL=$(grep '^kernel' *.manifest | sed -n 's/^kernel - \([0-9.]*\)~.*/\1/p')" >> $GITHUB_ENV
          
      # 15. 上传所有产物到 Artifact
      - name: 上传所有产物到 Artifact
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.variant }}_${{ env.DATE_FILENAME }}
          path: |
            ${{ env.OPENWRT_PATH }}/artifact/**
            ${{ env.FIRMWARE_PATH }}/*squashfs-factory.ubi
            ${{ env.FIRMWARE_PATH }}/*squashfs-sysupgrade.bin
          compression-level: 9
          if-no-files-found: ignore
          overwrite: true

      # 16. 上传 Firmware 到 Release
      - name: 上传 Firmware 到 Release
        if: ${{ steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == true }}
        uses: ncipollo/release-action@main
        with:
          name: R${{ env.DATE }} for ${{ env.DEVICE_TARGET }} # 使用传入的格式化日期
          allowUpdates: true
          replacesArtifacts: true
          tag: ${{ env.DEVICE_TARGET }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: |
            ${{ env.OPENWRT_PATH }}/artifact/*.tar.gz
            ${{ env.FIRMWARE_PATH }}/*squashfs-factory.ubi
            ${{ env.FIRMWARE_PATH }}/*squashfs-sysupgrade.bin
          body: |
            ### 📋 固件信息
            - 🔧 平台架构: ${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
            - 📦 固件源码: ${{ env.REPO_URL }}
            - 🌿 源码分支: ${{ env.REPO_BRANCH }}
            - ⚙️ 内核版本: ${{ env.KERNEL }}

      # 17. 发送 Telegram 通知
      - name: 发送 Telegram 通知
        if: ${{ secrets.TELEGRAM_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        run: |
          MESSAGE="${{ env.DEVICE_MODEL }} 固件编译完成
          发布时间：${{ env.DATE }}
          发布页面：https://github.com/${{ github.repository }}/releases/tag/${{ env.DEVICE_TARGET }}"
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE"

      # 18. 删除旧缓存
      - name: 删除旧缓存
        if: ${{ steps.compile.outputs.status == 'success' }}
        run: |
          echo "开始列出并删除旧缓存..."
          gh cache list --key ${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
            echo "删除缓存：$key"
            gh cache delete "$key"
          done
          echo "当前缓存使用情况："
          echo "ccache 目录大小: $(du -sh ${{ env.OPENWRT_PATH }}/.ccache | cut -f 1)"
          echo "staging_dir 目录大小: $(du -sh ${{ env.OPENWRT_PATH }}/staging_dir | cut -f 1)"